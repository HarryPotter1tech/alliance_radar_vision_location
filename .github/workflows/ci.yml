name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci:
    name: Essential CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libopencv-dev \
            libeigen3-dev \
            libyaml-cpp-dev \
            pkg-config \
            clang-format \
            cppcheck

      - name: Check formatting with clang-format
        run: |
          if ! command -v clang-format >/dev/null 2>&1; then
            echo "clang-format is not installed on runner"
            exit 1
          fi

          if [ ! -f .clang-format ]; then
            echo "Missing .clang-format at repository root"
            exit 1
          fi

          FAILED=0
          while IFS= read -r -d '' f; do
            case "$f" in
              build/*|thirty-party-lib/*|model/*|.github/*|,github/*|include/tiny_obj_loader.h)
                continue
                ;;
            esac

            tmp_file=$(mktemp)
            clang-format -style=file "$f" > "$tmp_file"
            if ! cmp -s "$f" "$tmp_file"; then
              echo "Formatting issues detected in $f"
              diff -u "$f" "$tmp_file" || true
              FAILED=1
            fi
            rm -f "$tmp_file"
          done < <(git ls-files -z '*.cpp' '*.c' '*.hpp' '*.h' '*.cc' '*.cxx' '*.hh' '*.hxx')

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

      - name: Run cppcheck (fast)
        run: |
          cppcheck -j "$(nproc)" --quiet \
            --enable=warning,performance,portability \
            --error-exitcode=1 src

      - name: Configure (CMake)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Run tests (if any)
        run: |
          if [ -f build/CTestTestfile.cmake ]; then
            cd build
            ctest --output-on-failure || true
          else
            echo "No tests configured"
          fi
